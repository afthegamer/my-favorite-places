<div class="card">
  <h3>Ajouter un lieu</h3>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Nom</label>
      <input id="name" type="text" formControlName="name" placeholder="Ex: Tour Eiffel" />
    </div>
    <div class="form-group">
      <label for="searchWord">Recherche de lieu</label>
      <input id="searchWord" type="text" formControlName="searchWord" placeholder="Ex: Paris Tour Eiffel" />
    </div>
    <div class="form-group">
      <label for="description">Description <span class="optional">(optionnel)</span></label>
      <textarea id="description" formControlName="description" rows="2" placeholder="Description du lieu..."></textarea>
    </div>
    @if (error) {
      <p class="error">{{ error }}</p>
    }
    <button type="submit" [disabled]="form.invalid || loading">
      {{ loading ? 'Ajout...' : 'Ajouter' }}
    </button>
  </form>
</div>
