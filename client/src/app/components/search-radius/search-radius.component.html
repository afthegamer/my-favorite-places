<div class="card">
  <div class="header">
    <h3>Recherche par rayon</h3>
    <button class="btn-map-center" type="button" (click)="useMapCenter()" [disabled]="!mapCenter">
      Utiliser le centre de la carte
    </button>
  </div>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="form-group">
        <label for="lat">Latitude</label>
        <input id="lat" type="number" step="any" formControlName="lat" placeholder="46.6" />
      </div>
      <div class="form-group">
        <label for="lng">Longitude</label>
        <input id="lng" type="number" step="any" formControlName="lng" placeholder="2.2" />
      </div>
      <div class="form-group">
        <label for="radius">Rayon (km)</label>
        <input id="radius" type="number" step="any" formControlName="radius" placeholder="50" />
      </div>
    </div>
    @if (error) {
      <p class="error">{{ error }}</p>
    }
    <button type="submit" [disabled]="form.invalid || loading">
      {{ loading ? 'Recherche...' : 'Rechercher' }}
    </button>
  </form>
</div>
