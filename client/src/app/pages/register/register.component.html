<div class="auth-page">
  <div class="auth-card">
    <h1>Inscription</h1>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="votre@email.com" />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" formControlName="password" placeholder="Mot de passe" />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="Confirmer" />
      </div>
      @if (form.hasError('passwordsMismatch') && form.get('confirmPassword')?.touched) {
        <p class="error">Les mots de passe ne correspondent pas</p>
      }
      @if (error) {
        <p class="error">{{ error }}</p>
      }
      <button type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Inscription...' : "S'inscrire" }}
      </button>
    </form>
    <p class="link">Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
  </div>
</div>
