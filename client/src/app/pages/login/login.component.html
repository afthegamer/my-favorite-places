<div class="auth-page">
  <div class="auth-card">
    <h1>Connexion</h1>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="votre@email.com" />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" formControlName="password" placeholder="Mot de passe" />
      </div>
      @if (error) {
        <p class="error">{{ error }}</p>
      }
      <button type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>
    <p class="link">Pas encore de compte ? <a routerLink="/register">Créer un compte</a></p>
  </div>
</div>
